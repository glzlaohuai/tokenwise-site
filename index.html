<!doctype html>
<html lang="en" data-lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TokenWise</title>
<style>
:root{color-scheme:dark}
*{box-sizing:border-box}
body{margin:0;background:#0d0f12;color:#e6eaf0;font:16px/1.75 -apple-system,BlinkMacSystemFont,"PingFang SC","Segoe UI",Roboto,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{max-width:640px;padding:48px 24px;text-align:center}
h1{font-size:40px;margin:0 0 8px;background:linear-gradient(90deg,#4aa8ff,#8a7cff);-webkit-background-clip:text;background-clip:text;color:transparent}
p{color:#c7ced8}
.links{margin:32px 0 0;display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.links a{color:#4aa8ff;text-decoration:none;border:1px solid #204a73;border-radius:10px;padding:10px 20px}
.muted{margin-top:40px;color:#5b6472;font-size:13px}
a{color:#4aa8ff}
/* language switcher */
.langsw{position:fixed;top:16px;right:16px;display:flex;gap:2px;background:#14171c;border:1px solid #262b33;border-radius:999px;padding:3px;z-index:10}
.langsw button{appearance:none;-webkit-appearance:none;border:0;background:transparent;color:#8a94a3;font:inherit;font-size:13px;line-height:1;padding:6px 12px;border-radius:999px;cursor:pointer}
html[data-lang="en"] .lang-en,html[data-lang="zh"] .lang-zh{background:#204a73;color:#e6eaf0}
html[data-lang="en"] [data-lang-block="zh"],html[data-lang="zh"] [data-lang-block="en"]{display:none}
</style>
<script>try{var l=localStorage.getItem('tw-lang');if(l==='en'||l==='zh'){var e=document.documentElement;e.setAttribute('data-lang',l);e.setAttribute('lang',l==='zh'?'zh-CN':'en');var t=e.getAttribute(l==='zh'?'data-title-zh':'data-title-en');if(t)document.title=t;}}catch(e){}</script>
</head>
<body>
<div class="langsw" role="group" aria-label="Language / 语言">
<button type="button" class="lang-en" data-set-lang="en" aria-pressed="true">EN</button>
<button type="button" class="lang-zh" data-set-lang="zh" aria-pressed="false">中文</button>
</div>
<div class="wrap">
<h1>TokenWise</h1>

<div data-lang-block="en">
<p>Local token usage tracking for AI coding tools — right in your macOS menu bar.</p>
<div class="links">
<a href="privacy.html">Privacy</a>
<a href="support.html">Support</a>
</div>
</div>

<div data-lang-block="zh">
<p>本地统计 Claude Code / Codex / OpenCode / Gemini 的 token 用量，常驻菜单栏。隐私优先，绝不上传。</p>
<div class="links">
<a href="privacy.html">隐私政策</a>
<a href="support.html">支持</a>
</div>
</div>

<p class="muted">© 2026 hiimobapps · <a href="mailto:494763134@qq.com">494763134@qq.com</a></p>
</div>
<script>
(function(){
  var doc=document.documentElement;
  function apply(l,save){
    doc.setAttribute('data-lang',l);
    doc.setAttribute('lang',l==='zh'?'zh-CN':'en');
    var t=doc.getAttribute(l==='zh'?'data-title-zh':'data-title-en');
    if(t)document.title=t;
    var b=document.querySelectorAll('[data-set-lang]');
    for(var i=0;i<b.length;i++)b[i].setAttribute('aria-pressed',b[i].getAttribute('data-set-lang')===l?'true':'false');
    if(save){try{localStorage.setItem('tw-lang',l);}catch(e){}}
  }
  var b=document.querySelectorAll('[data-set-lang]');
  for(var i=0;i<b.length;i++)(function(x){x.addEventListener('click',function(){apply(x.getAttribute('data-set-lang'),true);});})(b[i]);
  apply(doc.getAttribute('data-lang')||'en',false);
})();
</script>
</body></html>
